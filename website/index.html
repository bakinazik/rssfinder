<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Finder</title>
	<link rel="icon" type="image/png" sizes="16x16" href="dist/favicon-16x16.png">
	<link rel="icon" type="image/png" sizes="32x32" href="dist/favicon-32x32.png">
	<link rel="icon" type="image/x-icon" href="dist/favicon.ico">
	<link rel="icon" type="image/png" sizes="192x192" href="dist/android-chrome-192x192.png">
	<link rel="icon" type="image/png" sizes="512x512" href="dist/android-chrome-512x512.png">
	<link rel="apple-touch-icon" href="dist/apple-touch-icon.png">
    <style>
    @import url(https://fonts.bunny.net/css?family=inter:300,500,600,700);  
    
        :root {
            --bg: #ffffff;
            --card: #eeeeee;
            --text: #111111;
            --muted: #5f6368;
            --border: #e8eaed;
            --hover: #f1f3f4;
            --primary: #faa501;
            --primary-hover: #fb9400;
            --button-text: #3c4043;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #222222;
                --text: #e8eaed;
                --card: #333333;
                --muted: #9aa0a6;
                --border: #444444;
                --hover: #444444;
                --primary: #faa501;
                --button-text: #e8eaed;
            }
        }

        body, html {
            margin: 0; padding: 0; min-height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter';
        }

        /* Giriş Animasyonu */
        .intro-overlay {
            position: fixed;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, transparent 100%);
            opacity: 0.1;
            animation: slideGradient 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes slideGradient { to { left: 0; } }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            z-index: 2;
            position: relative;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        /* Sol Taraf: Tanıtım */
        .brand-section {
            opacity: 0;
            transform: translateX(-30px);
            animation: fadeInLeft 0.8s ease-out 0.8s forwards;
            max-width: 400px;
        }

        @keyframes fadeInLeft { to { opacity: 1; transform: translateX(0); } }

        .brand-section svg { width: 80px; height: 80px; color: var(--primary); margin-bottom: 10px; }
        .brand-section h1 { font-size: 48px; margin: 0; font-weight: 800; }
        .brand-section p { font-size: 18px; color: var(--muted); margin: 5px 0; }

        /* Sağ Taraf: Eklenti Widget */
        .plugin-widget {
            width: 360px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out 1.4s forwards;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        #status { font-weight: 500; color: var(--muted); font-size: 13px; }

        #refreshButton {
            background: none; border: 1px solid var(--border); border-radius: 7px;
            padding: 7px 15px; font-size: 12px; cursor: pointer; color: var(--button-text);
        }

        ul#rssLinks {
            list-style: none;
            max-height: 250px;
            overflow: hidden;
            background: var(--card);
            border-radius: 10px;
            padding: 0;
            margin: 0;
            min-height: 200px;
        }

        li {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            border-bottom: 1px solid var(--border);
            opacity: 0; transform: translateY(10px);
        }
        li:last-child { border-bottom: none; }

        li.show { animation: itemIn 0.4s ease-out forwards; }
        @keyframes itemIn { to { opacity: 1; transform: translateY(0); } }

        .feed-dot { color: var(--primary); width: 15px; height: 15px; flex-shrink: 0; }
        .feed-content { flex: 1; min-width: 0; }
        .feed-title { font-size: 12px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;display: flex ;}
        .feed-url { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; }
        
        .copy-button {
            width: 35px; height: 30px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--muted); background: var(--bg); border: none; border-radius: 8px;
        }

        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 180px; color: var(--muted);
        }
        .spinning { animation: spin 1s linear infinite; width: 48px; height: 48px; color: var(--primary); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BUTONLAR BÖLÜMÜ */
        .store-buttons {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 675px;
            justify-content: center;
            opacity: 0;
            animation: slideUp 0.8s ease-out 2s forwards;
        }

        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
        }

        .btn:hover {
            background: var(--hover);
            color: var(--primary);
        }

        .btn svg { width: 24px; height: 24px; }
        
		.footer-note {
			margin-top: 60px;
			text-align: center;
			font-size: 13px;
			color: var(--muted);
			opacity: 0;
			transform: translateY(20px);
			animation: slideUp 0.8s ease-out 2.6s forwards;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px
		}
		
		.footer-note span{
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 5px;
		}
		
        @media (max-width: 850px) {
            .hero-section { gap: 30px; flex-direction: column; text-align: center; }
            .brand-section { transform: translateY(-20px); animation: itemIn 0.8s ease-out 0.8s forwards; }
            .store-buttons { flex-direction: column; align-items: center; width: 360px; }
            .btn { width: 100%; box-sizing: border-box; }
        }

        ul::-webkit-scrollbar { width: 6px; }
        ul::-webkit-scrollbar-track { background: var(--border); border-radius: 3px; }
        ul::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
    </style>
</head>
<body>

    <div class="intro-overlay"></div>

    <div class="container">
        <div class="hero-section">
            <div class="brand-section">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M4 4a16 16 0 0 1 16 16" /><path d="M4 11a9 9 0 0 1 9 9" /></svg>
                <h1>RSS Finder</h1>
                <p>Easily find the feed.</p>
            </div>

            <div class="plugin-widget">
                <div class="header">
                    <div id="status">Scanning...</div>
                    <button id="refreshButton">Refresh</button>
                </div>

                <ul id="rssLinks">
                    <div id="emptyState" class="empty-state">
                        <svg class="spinning" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10" stroke-width="2" stroke-dasharray="40 20" stroke-linecap="round"/>
                        </svg>
                    </div>
                </ul>
            </div>
        </div>

        <div class="store-buttons">
            <a href="https://chromewebstore.google.com/detail/rss-finder/neodhllmmmmhfohbkeapdencnhegflfm" class="btn" target="_blank">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brand-chrome"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" /><path d="M9 12a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" /><path d="M12 9h8.4" /><path d="M14.598 13.5l-4.2 7.275" /><path d="M9.402 13.5l-4.2 -7.275" /></svg>
                Chrome Web Store
            </a>
            <a href="https://addons.mozilla.org/en-US/firefox/addon/rss-finder-bn/" class="btn" target="_blank">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brand-firefox"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4.028 7.82a9 9 0 1 0 12.823 -3.4c-1.636 -1.02 -3.064 -1.02 -4.851 -1.02h-1.647" /><path d="M4.914 9.485c-1.756 -1.569 -.805 -5.38 .109 -6.17c.086 .896 .585 1.208 1.111 1.685c.88 -.275 1.313 -.282 1.867 0c.82 -.91 1.694 -2.354 2.628 -2.093c-1.082 1.741 -.07 3.733 1.371 4.173c-.17 .975 -1.484 1.913 -2.76 2.686c-1.296 .938 -.722 1.85 0 2.234c.949 .506 3.611 -1 4.545 .354c-1.698 .102 -1.536 3.107 -3.983 2.727c2.523 .957 4.345 .462 5.458 -.34c1.965 -1.52 2.879 -3.542 2.879 -5.557c-.014 -1.398 .194 -2.695 -1.26 -4.75" /></svg>
                Firefox Addons
            </a>
            <a href="https://github.com/bakinazik/rssfinder" class="btn" target="_blank">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-brand-github"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" /></svg>
                Source Code
            </a>
        </div>
        <div class="footer-note">Made with love in <span><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="18" fill="#E30917"/><g transform="translate(2 0)"><path fill="#EEE" d="M16 24a6 6 0 1 1 0-12c1.31 0 2.52.425 3.507 1.138A7.332 7.332 0 0 0 14 10.647A7.353 7.353 0 0 0 6.647 18A7.353 7.353 0 0 0 14 25.354c2.195 0 4.16-.967 5.507-2.492A5.963 5.963 0 0 1 16 24zm3.913-5.77l2.44.562l.22 2.493l1.288-2.146l2.44.561l-1.644-1.888l1.287-2.147l-2.303.98l-1.644-1.889l.22 2.494z"/></g></svg> Turkey<span></div>
    </div>

    <script>
        const feeds = [
            { title: "ScienceAlert Google News", url: "https://www.sciencealert.com/feed/gn/" },
            { title: "ScienceAlert Microsoft News", url: "https://www.sciencealert.com/feed/msft/" },
            { title: "ScienceAlert Microsoft Video", url: "https://www.sciencealert.com/feed/msft-video/" },
            { title: "ScienceAlert Samsung News", url: "https://www.sciencealert.com/feed/sn/" },
        ];

        const list = document.getElementById('rssLinks');
        const status = document.getElementById('status');
        const emptyState = document.getElementById('emptyState');
        let count = 0;

        const SVG = {
            dot: `<svg viewBox="0 0 24 24" fill="none" class="feed-dot"><circle cx="12" cy="12" r="6" fill="currentColor"/></svg>`,
            copy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M7 9.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667l0 -8.666"></path><path d="M4.012 16.737a2.005 2.005 0 0 1 -1.012 -1.737v-10c0 -1.1 .9 -2 2 -2h10c.75 0 1.158 .385 1.5 1"></path></svg>`
        };

        window.onload = () => {
            setTimeout(() => {
                emptyState.style.display = 'none';
                feeds.forEach((feed, i) => {
                    setTimeout(() => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            ${SVG.dot}
                            <div class="feed-content">
                                <div class="feed-title">${feed.title}</div>
                                <span class="feed-url">${feed.url}</span>
                            </div>
                            <button class="copy-button">${SVG.copy}</button>
                        `;
                        list.appendChild(li);
                        requestAnimationFrame(() => li.classList.add('show'));
                        count++;
                        status.innerText = `${count} feed(s) found`;
                    }, i * 150);
                });
            }, 1800); 
        };
    </script>
</body>
</html>
